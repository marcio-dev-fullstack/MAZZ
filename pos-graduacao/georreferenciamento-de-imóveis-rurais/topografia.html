<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topografia Aplicada à Agricultura de Precisão</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d3320 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .presentation-container {
            width: 100%;
            max-width: 1280px;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .slide-viewer {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            aspect-ratio: 16/9;
            max-height: 720px;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide.active {
            display: block;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1a1a1a;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .btn {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #388e3c, #2e7d32);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .slide-counter {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }

        .thumbnails {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 20px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .thumbnail:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .thumbnail.active {
            border-color: #4caf50;
            opacity: 1;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .keyboard-hint {
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .slide-viewer {
                aspect-ratio: 4/3;
            }

            .thumbnail {
                width: 80px;
                height: 45px;
            }

            .controls {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="presentation-container">
        <div class="header">
            <h1>🌾 Topografia Aplicada à Agricultura de Precisão</h1>
            <p>Apresentação completa - 10 slides</p>
        </div>

        <div class="slide-viewer">
            <div class="slide active">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/990dffae-0f6e-45b4-86f8-ce48c3181e9b.png" alt="Slide 1 - Capa">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/05719b15-cfc4-46e6-ba5a-a732096d8f25.png" alt="Slide 2">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/c41d68b2-889e-4818-928c-6aa8675444b8.png" alt="Slide 3">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/634f1ba6-afd2-42fa-a671-cd388284d238.png" alt="Slide 4">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/cdbd966a-e218-4249-b29f-9704be499a0d.png" alt="Slide 5">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/b01c6f9e-b857-4f22-ba24-429e9f0fe088.png" alt="Slide 6">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/8ea1b469-2422-4b84-9435-504db97c0790.png" alt="Slide 7">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/cf89397d-e8df-4795-99fc-8a07536f19cf.png" alt="Slide 8">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/253e6e95-ee4f-45a6-a4c3-0037786f6072.png" alt="Slide 9">
            </div>
            <div class="slide">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/0e9bd12a-8301-462a-b17c-b8d32fe52409.png" alt="Slide 10 - Encerramento">
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 10%"></div>
        </div>

        <div class="controls">
            <button class="btn" id="prevBtn" onclick="changeSlide(-1)">◀ Anterior</button>
            <span class="slide-counter"><span id="currentSlide">1</span> / 10</span>
            <button class="btn" id="nextBtn" onclick="changeSlide(1)">Próximo ▶</button>
        </div>

        <div class="thumbnails">
            <div class="thumbnail active" onclick="goToSlide(0)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/990dffae-0f6e-45b4-86f8-ce48c3181e9b.png" alt="Slide 1">
            </div>
            <div class="thumbnail" onclick="goToSlide(1)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/05719b15-cfc4-46e6-ba5a-a732096d8f25.png" alt="Slide 2">
            </div>
            <div class="thumbnail" onclick="goToSlide(2)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/c41d68b2-889e-4818-928c-6aa8675444b8.png" alt="Slide 3">
            </div>
            <div class="thumbnail" onclick="goToSlide(3)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/634f1ba6-afd2-42fa-a671-cd388284d238.png" alt="Slide 4">
            </div>
            <div class="thumbnail" onclick="goToSlide(4)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/cdbd966a-e218-4249-b29f-9704be499a0d.png" alt="Slide 5">
            </div>
            <div class="thumbnail" onclick="goToSlide(5)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/b01c6f9e-b857-4f22-ba24-429e9f0fe088.png" alt="Slide 6">
            </div>
            <div class="thumbnail" onclick="goToSlide(6)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/8ea1b469-2422-4b84-9435-504db97c0790.png" alt="Slide 7">
            </div>
            <div class="thumbnail" onclick="goToSlide(7)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/cf89397d-e8df-4795-99fc-8a07536f19cf.png" alt="Slide 8">
            </div>
            <div class="thumbnail" onclick="goToSlide(8)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/253e6e95-ee4f-45a6-a4c3-0037786f6072.png" alt="Slide 9">
            </div>
            <div class="thumbnail" onclick="goToSlide(9)">
                <img src="https://picture-search.skywork.ai/aippt/image/sheet/0e9bd12a-8301-462a-b17c-b8d32fe52409.png" alt="Slide 10">
            </div>
        </div>

        <div style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; color: #ffffff;">
  
          <p style="font-size: 1em; opacity: 0.8; margin: 0; color: #ffffff;">
            &copy; 2026 MAZZ - Todos os direitos reservados.
          </p>
        
          <div style="margin-top: 20px; font-size: 1rem; color: #ffffff;">
            Desenvolvido por:
            <a href="http://www.razgo.com.br" 
               target="_blank" 
               style="
                 color: red; 
                 text-decoration: none; 
                 font-weight: bold; 
                 letter-spacing: 1px;
               ">RAZGO</a>
          </div>
        
        </div>

    </div>

    <script>
        let currentSlideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const thumbnails = document.querySelectorAll('.thumbnail');
        const totalSlides = slides.length;

        function updateSlide() {
            // Update slides
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlideIndex);
            });

            // Update thumbnails
            thumbnails.forEach((thumb, index) => {
                thumb.classList.toggle('active', index === currentSlideIndex);
            });

            // Update counter
            document.getElementById('currentSlide').textContent = currentSlideIndex + 1;

            // Update buttons
            document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
            document.getElementById('nextBtn').disabled = currentSlideIndex === totalSlides - 1;

            // Update progress bar
            const progress = ((currentSlideIndex + 1) / totalSlides) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function changeSlide(direction) {
            const newIndex = currentSlideIndex + direction;
            if (newIndex >= 0 && newIndex < totalSlides) {
                currentSlideIndex = newIndex;
                updateSlide();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            updateSlide();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeSlide(-1);
            if (e.key === 'ArrowRight') changeSlide(1);
        });

        // Initialize
        updateSlide();
    </script>
</body>
</html>
