<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAZZ - Cursos</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#001f3f">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #001f3f; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { opacity: 0.8; margin-bottom: 35px; font-size: 1rem; }
        
        .btn-list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
            max-width: 320px; 
            margin: 0 auto; 
        }
        
        .btn { 
            background: white; 
            color: #001f3f; 
            padding: 18px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            display: block;
        }
        
        .btn:active { transform: scale(0.97); background: #eee; }
    </style>
</head>
<body>

    <div class="icon">📚</div>
    <h1>CURSOS</h1>
    <p>Capacitação e Treinamentos Profissionais</p>

    <div class="btn-list">
        <a href="#" class="btn">CURSOS LIVRES</a>
        <a href="#" class="btn">EXTENSÃO UNIVERSITÁRIA</a>
        <a href="#" class="btn">CERTIFICAÇÕES NRs</a>
        <a href="#" class="btn">PACOTE OFFICE</a>
    </div>

    <script src="footer.js"></script>
</body>
</html>
