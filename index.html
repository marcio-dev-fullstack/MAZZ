<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>MAZZ - Cursos</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#001f3f" />
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #001f3f;
        color: white;
        font-family: "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        text-align: center;
      }

      /* CONFIGURAÇÃO DA LOGO */
      .logo-mazz {
        max-width: 220px; /* Tamanho ideal para a logo horizontal */
        height: auto;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 5px;
        letter-spacing: 2px;
      }
      p {
        opacity: 0.8;
        margin-bottom: 30px;
        font-size: 1rem;
      }

      .btn-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        width: 100%;
      }

      .btn {
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-weight: 900;
        font-size: 1.1rem;
        border-radius: 20px;
        text-transform: uppercase;
        text-align: center;
        padding: 15px;
        color: #ffffff !important;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        transition: transform 0.2s;
        animation: pulse-animation 2s infinite;
      }

      .btn-sst {
        background-color: #e63946;
      }
      .btn-educacao {
        background-color: #f4a261;
      }
      .btn-tecnologia {
        background-color: #2a9d8f;
      }
      .btn-engenharia {
        background-color: #0077b6;
      }
      .btn-gestao {
        background-color: #8338ec;
      }

      @keyframes pulse-animation {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
        }
        100% {
          transform: scale(1);
        }
      }

      .btn:active {
        transform: scale(0.95);
        animation: none;
      }

      @media (max-width: 380px) {
        .btn {
          font-size: 0.9rem;
          border-radius: 15px;
        }
        .logo-mazz {
          max-width: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="img/logo.png" alt="Logo MAZZ" class="logo-mazz" />

      <h1>CURSOS</h1>
      <p>Capacitação e Treinamentos Profissionais</p>

      <nav class="btn-list">
        <a
          href="nr/index.html"
          class="btn btn-sst"
          target="_blank"
          rel="noopener noreferrer"
          >NR & SST</a
        >
        <a href="educacao.html" class="btn btn-educacao">EDUCAÇÃO</a>
        <a href="tecnologia.html" class="btn btn-tecnologia">TECNOLOGIA</a>
        <a href="engenharias.html" class="btn btn-engenharia">ENGENHARIA</a>
        <a
          href="gestao-adm.html"
          class="btn btn-gestao"
          style="grid-column: span 2; aspect-ratio: auto; padding: 25px"
          >GESTÃO & ADMINISTRAÇÃO</a
        >
      </nav>
    </div>
